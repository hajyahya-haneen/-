<!doctype html>
<html lang="ar" dir="rtl">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Flipbook</title>

<style>

*{ box-sizing:border-box; }

html, body{
margin:0;
padding:0;
height:100dvh;
background:#f2f2f2;
font-family:Arial, sans-serif;
overflow:hidden;
}

body{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:12px;
padding:10px;
}

#book-wrap{
width:min(1200px,95vw);
height:min(82dvh,760px);
min-height:320px;
position:relative;
}

#book{
width:100%;
height:100%;
}

.btns{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

button{
padding:10px 16px;
border:0;
border-radius:12px;
cursor:pointer;
box-shadow:0 6px 18px rgba(0,0,0,.12);
background:#fff;
font-size:14px;
}

.loading{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(242,242,242,.85);
border-radius:12px;
font-size:14px;
color:#333;
visibility:hidden;
z-index:5;
}

.loading.show{
visibility:visible;
}

/* تكبير بالهاتف عند Landscape */

@media (max-width:900px) and (orientation:landscape){
#book-wrap{
width:min(1400px,99vw);
height:min(90dvh,900px);
}
}

</style>
</head>

<body>

<div id="book-wrap">
<div class="loading" id="loading">جاري تحميل الصفحات…</div>
<div id="book"></div>
</div>

<div class="btns">
<button id="prev">السابق</button>
<button id="next">التالي</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>

const TOTAL_PAGES = 24;

/* ترتيب الصور طبيعي */
const pages = [];

for (let i = 1; i <= TOTAL_PAGES; i++){
pages.push(`${i}.jpg`);
}

const bookEl = document.getElementById("book");
const wrapEl = document.getElementById("book-wrap");
const loadingEl = document.getElementById("loading");

let pageFlip = null;
let imagesReady = false;

function showLoading(on){
loadingEl.classList.toggle("show", !!on);
}

/* تحميل الصور مسبقاً */

function preloadImages(urls){

if(imagesReady) return Promise.resolve();

showLoading(true);

const loaders = urls.map(src => new Promise(resolve => {

const img = new Image();

img.onload = () => resolve(true);
img.onerror = () => resolve(false);

img.src = src;

}));

return Promise.all(loaders).then(()=>{

imagesReady = true;

showLoading(false);

});

}

/* لأن الصور مربعة */

function computeSquarePageSize(){

const W = Math.max(320, wrapEl.clientWidth);
const H = Math.max(320, wrapEl.clientHeight);

let page = Math.floor(Math.min(H, W / 2));

page = Math.max(260, page);

return {pageW:page,pageH:page};

}

async function initFlipbook(){

let currentIndex = 0;

try{
if(pageFlip) currentIndex = pageFlip.getCurrentPageIndex();
}catch(e){}

showLoading(true);

await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));

await preloadImages(pages);

if(pageFlip){
try{pageFlip.destroy()}catch(e){}
}

bookEl.innerHTML = "";

const {pageW,pageH} = computeSquarePageSize();

pageFlip = new St.PageFlip(bookEl,{

width:pageW,
height:pageH,

size:"fixed",
usePortrait:false,

/* الغلاف الأمامي والخلفي لوحدهما */

showCover:true,

mobileScrollSupport:true,
useMouseEvents:true,

swipeDistance:20,
flippingTime:650,

maxShadowOpacity:0.35

});

pageFlip.loadFromImages(pages);

try{
pageFlip.flip(currentIndex);
}catch(e){}

showLoading(false);

}

initFlipbook();

/* الأزرار */

document.getElementById("next").onclick=()=>pageFlip.flipNext();
document.getElementById("prev").onclick=()=>pageFlip.flipPrev();

/* إعادة التهيئة عند تغيير حجم الشاشة */

let t=null;

function scheduleReinit(){

clearTimeout(t);

t=setTimeout(()=>initFlipbook(),350);

}

window.addEventListener("resize",scheduleReinit);
window.addEventListener("orientationchange",()=>setTimeout(scheduleReinit,250));

</script>

</body>
</html>
