<!doctype html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Flipbook</title>

  <style>
    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      background:#f2f2f2;
      font-family: Arial, sans-serif;
      height: 100dvh;
      min-height: 100svh;
      overflow:hidden;
    }

    body{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:10px;
      touch-action: pan-y;
      -webkit-tap-highlight-color: transparent;
    }

    #book-wrap{
      width: min(1200px, 98vw);
      height: min(82dvh, 760px);
      min-height: 320px;
      position:relative;
    }

    /* يكبر بالـ Landscape */
    @media (max-width: 900px) and (orientation: landscape){
      #book-wrap{
        width: min(1400px, 99vw);
        height: min(90dvh, 900px);
      }
    }

    #book{
      width:100%;
      height:100%;
    }

    .btns{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    button{
      padding:10px 16px;
      border:0;
      border-radius:12px;
      cursor:pointer;
      box-shadow:0 6px 18px rgba(0,0,0,.12);
      background:#fff;
      font-size:14px;
    }

    .hint{
      color:#333;
      font-size:13px;
      text-align:center;
      line-height:1.5;
      max-width: 900px;
      opacity:.9;
    }

    .loading{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(242,242,242,.85);
      color:#333;
      font-size:14px;
      border-radius:12px;
      z-index:5;
      visibility:hidden;
    }
    .loading.show{ visibility:visible; }
  </style>
</head>

<body>

  <div id="book-wrap">
    <div class="loading" id="loading">جاري تحميل الصفحات…</div>
    <div id="book"></div>
  </div>

  <div class="btns">
    <button id="prev">السابق</button>
    <button id="next">التالي</button>
  </div>

  <div class="hint">
    على الهاتف: اسحبي من طرف الصفحة للتقليب. (الكتاب يعرض صفحتين دائمًا، ويكبر أكثر عند وضع Landscape)
  </div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <script>
    const TOTAL_PAGES = 24;

    // ✅ ترتيب الصور مع تبديل داخل كل زوج (الكتابة يمين / الصورة يسار)
    const pages = [];
    pages.push(`1.jpg`); // غلاف أمامي

    for (let i = 2; i <= TOTAL_PAGES - 1; i += 2) {
      pages.push(`${i + 1}.jpg`);
      pages.push(`${i}.jpg`);
    }

    pages.push(`${TOTAL_PAGES}.jpg`); // غلاف خلفي

    const bookEl = document.getElementById('book');
    const wrapEl = document.getElementById('book-wrap');
    const loadingEl = document.getElementById('loading');

    let pageFlip = null;
    let imagesReady = false;

    const isMobile = () => window.matchMedia("(max-width: 900px)").matches;

    function showLoading(on){
      loadingEl.classList.toggle('show', !!on);
    }

    // Preload مرة واحدة لمنع صفحات بيضاء/اختفاء بعد الدوران
    function preloadImages(urls){
      if (imagesReady) return Promise.resolve();
      showLoading(true);

      const loaders = urls.map(src => new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = src;
      }));

      return Promise.all(loaders).then(() => {
        imagesReady = true;
        showLoading(false);
      });
    }

    // حساب مقاس "الصفحة الواحدة" بحيث:
    // - دائمًا صفحتين جنب بعض داخل الحاوية
    // - مناسب لصور طولية
    function computePageSize(){
      const W = Math.max(320, wrapEl.clientWidth);
      const H = Math.max(320, wrapEl.clientHeight);

      // نسبة الصفحة (عرض/ارتفاع) لصور طولية — عدّليها إذا صورك أضيق/أعرض
      // 0.70 ممتاز لصفحات 4:5 تقريبًا
      const PAGE_RATIO = 0.70;

      let pageH = Math.floor(H);
      let pageW = Math.floor(pageH * PAGE_RATIO);

      // لازم صفحتين يدخلوا بعرض الحاوية
      const maxPageWByContainer = Math.floor(W / 2);
      if (pageW > maxPageWByContainer) {
        pageW = maxPageWByContainer;
        pageH = Math.floor(pageW / PAGE_RATIO);
      }

      // حدود أمان
      pageW = Math.max(260, pageW);
      pageH = Math.max(320, pageH);

      return { pageW, pageH };
    }

    async function initFlipbookSafe(){
      // احفظي الصفحة الحالية
      let currentIndex = 0;
      try { if (pageFlip) currentIndex = pageFlip.getCurrentPageIndex(); } catch(e){}

      showLoading(true);

      // انتظري استقرار القياسات (مهم جدًا على الهاتف)
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

      await preloadImages(pages);

      // دمّري القديم
      if (pageFlip) {
        try { pageFlip.destroy(); } catch(e){}
        pageFlip = null;
      }
      bookEl.innerHTML = "";

      const { pageW, pageH } = computePageSize();
      const mobile = isMobile();

      pageFlip = new St.PageFlip(bookEl, {
        // مهم: هذه أبعاد الصفحة الواحدة (Double spread = صفحتين)
        width: pageW,
        height: pageH,

        // ✅ "fixed" + usePortrait:false = صفحتين دائمًا حتى على الهاتف
        size: "fixed",
        usePortrait: false,

        showCover: true,

        // لمس/سحب
        mobileScrollSupport: true,
        useMouseEvents: true,

        // أسهل للموبايل
        swipeDistance: mobile ? 8 : 30,
        flippingTime: mobile ? 520 : 700,

        maxShadowOpacity: 0.35,
        disableFlipByClick: false
      });

      pageFlip.loadFromImages(pages);

      // ارجعي لنفس الصفحة بعد التهيئة
      try { pageFlip.flip(currentIndex); } catch(e){}

      showLoading(false);
    }

    // تشغيل أولي
    initFlipbookSafe();

    // أزرار
    document.getElementById('next').addEventListener('click', () => pageFlip && pageFlip.flipNext());
    document.getElementById('prev').addEventListener('click', () => pageFlip && pageFlip.flipPrev());

    // إعادة تهيئة آمنة عند التدوير/تغيير الحجم
    let timer = null;
    function scheduleReinit(){
      clearTimeout(timer);
      timer = setTimeout(() => initFlipbookSafe(), 350);
    }

    window.addEventListener('resize', scheduleReinit);
    window.addEventListener('orientationchange', () => setTimeout(scheduleReinit, 250));
  </script>

</body>
</html>
