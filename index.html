<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Flipbook</title>

  <style>
    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:#f2f2f2;
      font-family: Arial, sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      gap:10px;
      padding:10px;
      /* يساعد اللمس داخل منطقة الكتاب */
      touch-action: pan-y;
      -webkit-tap-highlight-color: transparent;
    }

    /* الكتاب */
    #book-wrap{
      width: min(1200px, 98vw);
      /* ارتفاع مناسب للهاتف */
      height: min(82vh, 760px);
      background:transparent;
    }

    #book{
      width:100%;
      height:100%;
    }

    .btns{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:center;
    }

    button{
      padding:10px 14px;
      border:0;
      border-radius:10px;
      cursor:pointer;
      box-shadow:0 6px 18px rgba(0,0,0,.12);
      background:#fff;
      font-size:14px;
    }

    .hint{
      color:#333;
      font-size:13px;
      text-align:center;
      line-height:1.5;
      max-width: 900px;
      opacity:.9;
    }

    /* تحسين العرض في Landscape على الهاتف */
    @media (max-width: 900px) and (orientation: landscape){
      #book-wrap{
        width: min(1300px, 99vw);
        height: min(90vh, 900px);
      }
      button{ padding:10px 16px; }
    }
  </style>
</head>

<body>
  <div id="book-wrap">
    <div id="book"></div>
  </div>

  <div class="btns">
    <button id="prev">السابق</button>
    <button id="next">التالي</button>
  </div>

  <div class="hint">
    على الهاتف: اسحبي من طرف الصفحة للتقليب. في وضع Landscape سيكبر الكتاب ويصير التنقل أسهل.
  </div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <script>
    const TOTAL_PAGES = 24;

    // ترتيب الصور + تبديل اليمين/اليسار داخل كل زوج (مثل ما اتفقنا)
    const pages = [];
    pages.push(`1.jpg`); // الغلاف الأمامي

    for (let i = 2; i <= TOTAL_PAGES - 1; i += 2) {
      pages.push(`${i + 1}.jpg`);
      pages.push(`${i}.jpg`);
    }

    pages.push(`${TOTAL_PAGES}.jpg`); // الغلاف الخلفي

    const bookEl = document.getElementById('book');

    let pageFlip = null;

    const isMobile = () => window.matchMedia("(max-width: 900px)").matches;
    const isLandscape = () => window.matchMedia("(orientation: landscape)").matches;

    function initFlipbook(){
      if (pageFlip) {
        pageFlip.destroy();
        pageFlip = null;
      }

      // إعدادات محسنة للهاتف + Landscape
      const mobile = isMobile();
      const landscape = isLandscape();

      pageFlip = new St.PageFlip(bookEl, {
        // “مقاس الصفحة الواحدة” (مبدئي) — المكتبة ستمدده عبر size:stretch
        width: 700,
        height: 700,

        size: "stretch",
        minWidth: mobile ? 280 : 315,
        maxWidth: 1600,
        minHeight: mobile ? 320 : 315,
        maxHeight: 1600,

        showCover: true,

        // لمس/سحب
        mobileScrollSupport: true,
        useMouseEvents: true,

        // على الهاتف نجعل السحب أسهل
        swipeDistance: mobile ? 8 : 30,

        // أسرع قليلًا على الهاتف
        flippingTime: mobile ? 520 : 700,

        // ظل واقعي
        maxShadowOpacity: 0.35,

        disableFlipByClick: false
      });

      pageFlip.loadFromImages(pages);

      // ملاحظة: لا نُجبر “صفحتين دائمًا” على الهاتف لأن المكتبة تختار الأفضل حسب العرض،
      // لكن في Landscape ومع المساحة الأكبر غالبًا ستظهر صفحتين بشكل مريح.
    }

    initFlipbook();

    document.getElementById('next').addEventListener('click', () => pageFlip.flipNext());
    document.getElementById('prev').addEventListener('click', () => pageFlip.flipPrev());

    // إعادة تهيئة بعد تدوير الهاتف/تغيير الحجم لضبط القياسات والوضوح
    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => initFlipbook(), 250);
    });
  </script>
</body>
</html>
