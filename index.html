<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Arabic Flipbook (RTL)</title>

  <style>
    *{ box-sizing:border-box; }

    html, body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      background:#f2f2f2;
      font-family: Arial, sans-serif;
    }

    /* مساحة العرض */
    #stage{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px;
    }

    /* الكتاب */
    #flipbook{
      box-shadow: 0 18px 55px rgba(0,0,0,.18);
      background:#fff;
    }

    /* صفحة */
    .page{
      background:#fff;
    }

    .page img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none; /* خلي اللمس على الصفحة نفسها */
    }

    /* أزرار */
    .btns{
      position:fixed;
      left:50%;
      bottom:12px;
      transform:translateX(-50%);
      display:flex;
      gap:10px;
      z-index:10;
    }

    button{
      padding:10px 14px;
      border:0;
      border-radius:10px;
      cursor:pointer;
      box-shadow:0 6px 18px rgba(0,0,0,.12);
      background:#ffffff;
      font-size:14px;
    }

    /* نجبر Landscape على الهاتف: إذا الهاتف Portrait ندوّر المسرح 90° */
    body.portrait #stage{
      transform: rotate(90deg);
      transform-origin: center center;
    }

    /* لأننا دوّرنا المسرح، نحتاج ننقل الأزرار لتظل تحت */
    body.portrait .btns{
      transform: translateX(-50%) rotate(90deg);
      transform-origin: center center;
      bottom: 18px;
    }
  </style>
</head>

<body>
  <div id="stage">
    <div id="flipbook"></div>
  </div>

  <div class="btns">
    <button id="prev">السابق</button>
    <button id="next">التالي</button>
  </div>

  <!-- ملفاتك المحلية -->
  <script src="./jquery.min.js"></script>
  <script src="./turn.min.js"></script>

  <script>
    const TOTAL_PAGES = 24;

    // بناء الصفحات (1.jpg ... 24.jpg)
    const flipbookEl = document.getElementById('flipbook');
    flipbookEl.innerHTML = "";

    for(let i=1; i<=TOTAL_PAGES; i++){
      const page = document.createElement('div');
      page.className = 'page';
      // اجعل الغلافين "hard" (Turn.js يعتبرها أفضل كغلاف)
      if(i === 1 || i === TOTAL_PAGES) page.classList.add('hard');

      const img = document.createElement('img');
      img.src = `${i}.jpg`;
      img.alt = `Page ${i}`;

      page.appendChild(img);
      flipbookEl.appendChild(page);
    }

    function setPortraitClass(){
      const portrait = window.innerHeight > window.innerWidth;
      document.body.classList.toggle('portrait', portrait);
    }

    function getBookSize(){
      // نريد دائماً صفحتين (double) وبشكل مقروء
      // نحدد قياس "الكتاب" حسب وضع الشاشة الحقيقي
      const portrait = window.innerHeight > window.innerWidth;

      // إذا Portrait، نحن سندور المسرح، لذا نعامل الأبعاد وكأنها متبدلة
      const W = portrait ? window.innerHeight : window.innerWidth;
      const H = portrait ? window.innerWidth  : window.innerHeight;

      // book بنسبة 2:1 تقريبًا (صفحتين متقابلتين)
      const maxW = Math.min(1200, Math.floor(W * 0.95));
      const maxH = Math.floor(H * 0.88);

      // نحافظ على نسبة 2:1 تقريبًا
      let bookW = maxW;
      let bookH = Math.floor(bookW / 2);

      if(bookH > maxH){
        bookH = maxH;
        bookW = Math.floor(bookH * 2);
      }

      return { width: bookW, height: bookH };
    }

    function initOrResize(){
      setPortraitClass();

      const { width, height } = getBookSize();

      // إذا تم تهيئة turn من قبل، فقط نعمل resize
      if ($(flipbookEl).data('turn')) {
        $('#flipbook').turn('size', width, height);
        return;
      }

      // تهيئة الكتاب
      $('#flipbook').turn({
        width,
        height,
        autoCenter: true,
        display: 'double',       // دائماً صفحتين
        direction: 'rtl',        // مهم: تقليب عربي (من اليسار لليمين)
        gradients: true,
        acceleration: true,
        elevation: 50
      });
    }

    // تشغيل
    initOrResize();

    // أزرار
    document.getElementById('next').addEventListener('click', () => {
      $('#flipbook').turn('next'); // في RTL هذا يذهب "للأمام" باتجاه اليمين
    });
    document.getElementById('prev').addEventListener('click', () => {
      $('#flipbook').turn('previous');
    });

    // إعادة ضبط عند تدوير الشاشة/تغيير الحجم
    let t = null;
    window.addEventListener('resize', () => {
      clearTimeout(t);
      t = setTimeout(() => initOrResize(), 200);
    });
  </script>
</body>
</html>
