<!doctype html>
<html lang="ar" dir="rtl">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flipbook</title>

<style>

body{
margin:0;
background:#f2f2f2;
font-family:Arial, sans-serif;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
gap:12px;
}

#book-wrap{
width:min(1200px,95vw);
aspect-ratio:2/1;
}

#book{
width:100%;
height:100%;
}

.btns{
display:flex;
gap:10px;
}

button{
padding:10px 16px;
border:0;
border-radius:10px;
cursor:pointer;
box-shadow:0 6px 18px rgba(0,0,0,.12);
font-size:14px;
}

</style>
</head>

<body>

<div id="book-wrap">
<div id="book"></div>
</div>

<div class="btns">
<button id="prev">السابق</button>
<button id="next">التالي</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>

const TOTAL_PAGES = 24;

const pages = [];

/* الغلاف الأمامي */
pages.push(`1.jpg`);

/* تبديل الصفحات اليمين واليسار */
for (let i = 2; i <= TOTAL_PAGES - 1; i += 2) {

pages.push(`${i+1}.jpg`);
pages.push(`${i}.jpg`);

}

/* الغلاف الخلفي */
pages.push(`${TOTAL_PAGES}.jpg`);

const bookEl = document.getElementById("book");

const pageFlip = new St.PageFlip(bookEl,{
width:600,
height:600,
size:"stretch",
minWidth:315,
maxWidth:1200,
minHeight:315,
maxHeight:1200,
showCover:true,
mobileScrollSupport:true,
useMouseEvents:true,
swipeDistance:30,
flippingTime:700,
maxShadowOpacity:0.35
});

pageFlip.loadFromImages(pages);

document.getElementById("next").onclick = () => pageFlip.flipNext();
document.getElementById("prev").onclick = () => pageFlip.flipPrev();

</script>

</body>
</html>
