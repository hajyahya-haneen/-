<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Flipbook</title>

  <style>
    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:#f2f2f2;
      font-family: Arial, sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      gap:12px;
      padding:12px;
      touch-action: pan-y; /* يساعد السحب داخل الكتاب */
    }

    #book-wrap{
      width: min(1200px, 96vw);
      /* على الموبايل نسمح بارتفاع أكبر */
      height: min(82vh, 720px);
      background: transparent;
    }

    #book{
      width:100%;
      height:100%;
    }

    .btns{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    button{
      padding:10px 16px;
      border:0;
      border-radius:10px;
      cursor:pointer;
      box-shadow:0 6px 18px rgba(0,0,0,.12);
      font-size:14px;
    }

    .hint{
      font-size:13px;
      color:#444;
      text-align:center;
      max-width: 900px;
      line-height:1.5;
    }
  </style>
</head>

<body>

  <div id="book-wrap">
    <div id="book"></div>
  </div>

  <div class="btns">
    <button id="prev">السابق</button>
    <button id="next">التالي</button>
  </div>

  <div class="hint">
    على الهاتف: اسحبي بإصبعك من طرف الصفحة (يمين/يسار) للتقليب. على الشاشات الواسعة يظهر صفحتين متقابلتين.
  </div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <script>
    const TOTAL_PAGES = 24;

    // --- ترتيب الصور مع تبديل اليمين/اليسار داخل كل زوج ---
    const pages = [];
    pages.push(`1.jpg`); // الغلاف الأمامي

    for (let i = 2; i <= TOTAL_PAGES - 1; i += 2) {
      pages.push(`${i + 1}.jpg`); // تبديل
      pages.push(`${i}.jpg`);
    }

    pages.push(`${TOTAL_PAGES}.jpg`); // الغلاف الخلفي

    const bookEl = document.getElementById("book");

    // نقرر وضع العرض بناءً على عرض الشاشة
    const isMobile = () => window.matchMedia("(max-width: 768px)").matches;

    // إعدادات “واقعية” مع دعم السحب على الهاتف
    let pageFlip = null;

    function initFlipbook(){
      if (pageFlip) {
        pageFlip.destroy();
        pageFlip = null;
      }

      pageFlip = new St.PageFlip(bookEl, {
        width: 600,
        height: 600,

        // مهم: يجعل المكتبة تختار تلقائيًا أفضل وضع (صفحة/صفحتين)
        size: "stretch",

        minWidth: 280,
        maxWidth: 1400,
        minHeight: 320,
        maxHeight: 1400,

        // الغلاف لوحده (أول وآخر صفحة)
        showCover: true,

        // هذا يترك للمكتبة قرار عرض صفحتين على الشاشات الواسعة
        // وعلى الموبايل غالبًا صفحة واحدة لقراءة أفضل
        // (نتركه default مع stretch)
        
        // سحب/لمس
        useMouseEvents: true,
        mobileScrollSupport: true,
        swipeDistance: isMobile() ? 10 : 30,   // حساسية أعلى للموبايل
        flippingTime: isMobile() ? 550 : 700,  // أسرع للموبايل
        maxShadowOpacity: 0.35,
        disableFlipByClick: false
      });

      pageFlip.loadFromImages(pages);
    }

    initFlipbook();

    // أزرار
    document.getElementById("next").addEventListener("click", () => pageFlip.flipNext());
    document.getElementById("prev").addEventListener("click", () => pageFlip.flipPrev());

    // إعادة تهيئة عند تغيير حجم الشاشة/تدوير الهاتف
    let resizeTimer = null;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => initFlipbook(), 250);
    });
  </script>

</body>
</html>
