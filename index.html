<!doctype html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Flipbook</title>

  <style>
    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      background:#f2f2f2;
      font-family: Arial, sans-serif;
      /* d/s vh تمنع مشاكل اختفاء/قفز الارتفاع على الهاتف */
      height: 100dvh;
      min-height: 100svh;
    }

    body{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:10px;
      touch-action: pan-y;
      -webkit-tap-highlight-color: transparent;
    }

    #book-wrap{
      width: min(1200px, 98vw);
      height: min(82dvh, 760px);
      min-height: 320px;
      background:transparent;
      position:relative;
    }

    /* أكبر في Landscape على الهاتف */
    @media (max-width: 900px) and (orientation: landscape){
      #book-wrap{
        width: min(1400px, 99vw);
        height: min(90dvh, 900px);
      }
    }

    #book{
      width:100%;
      height:100%;
    }

    .btns{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:center;
    }

    button{
      padding:10px 14px;
      border:0;
      border-radius:10px;
      cursor:pointer;
      box-shadow:0 6px 18px rgba(0,0,0,.12);
      background:#fff;
      font-size:14px;
    }

    .hint{
      color:#333;
      font-size:13px;
      text-align:center;
      line-height:1.5;
      max-width: 900px;
      opacity:.9;
    }

    /* طبقة تحميل بسيطة */
    .loading{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(242,242,242,.85);
      color:#333;
      font-size:14px;
      border-radius:12px;
      z-index:5;
      visibility:hidden;
    }
    .loading.show{ visibility:visible; }
  </style>
</head>

<body>

  <div id="book-wrap">
    <div class="loading" id="loading">جاري تحميل الصفحات…</div>
    <div id="book"></div>
  </div>

  <div class="btns">
    <button id="prev">السابق</button>
    <button id="next">التالي</button>
  </div>

  <div class="hint">
    على الهاتف: اسحبي من طرف الصفحة للتقليب.  Landscape .
  </div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <script>
    const TOTAL_PAGES = 24;

    // ✅ ترتيب الصور مع تبديل اليمين/اليسار داخل كل زوج (لجعل الكتابة يمين والصورة يسار)
    const pages = [];
    pages.push(`1.jpg`); // الغلاف الأمامي

    for (let i = 2; i <= TOTAL_PAGES - 1; i += 2) {
      pages.push(`${i + 1}.jpg`);
      pages.push(`${i}.jpg`);
    }

    pages.push(`${TOTAL_PAGES}.jpg`); // الغلاف الخلفي

    const bookEl = document.getElementById('book');
    const wrapEl = document.getElementById('book-wrap');
    const loadingEl = document.getElementById('loading');

    let pageFlip = null;
    let imagesReady = false;

    const isMobile = () => window.matchMedia("(max-width: 900px)").matches;

    function showLoading(on){
      loadingEl.classList.toggle('show', !!on);
    }

    // تحميل الصور مسبقًا (مرّة واحدة) لتفادي فراغ/اختفاء عند الدوران
    function preloadImages(urls){
      if (imagesReady) return Promise.resolve();
      showLoading(true);

      const loaders = urls.map(src => new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false); // حتى لو صورة ناقصة لا نعلّق
        img.src = src;
      }));

      return Promise.all(loaders).then(() => {
        imagesReady = true;
        showLoading(false);
      });
    }

    function getStableBookSize(){
      // نعتمد على قياس الحاوية الفعلي لتفادي مشاكل الارتفاع عند الدوران
      const w = Math.max(300, wrapEl.clientWidth);
      const h = Math.max(320, wrapEl.clientHeight);

      // صفحة واحدة baseline؛ المكتبة ستعرض سبريد حسب المساحة (showCover + stretch)
      // نمرّر width/height كحجم "صفحة واحدة"
      // نجعل الصفحة تقريباً مربعة/قريبة لتناسب صورك
      const pageH = Math.floor(h);
      const pageW = Math.floor(Math.min(w / 2, pageH)); // صفحتين جنب بعض تقريبًا

      return { pageW, pageH };
    }

    async function initFlipbookSafe(){
      // احفظ الصفحة الحالية قبل التدمير
      let currentIndex = 0;
      try { if (pageFlip) currentIndex = pageFlip.getCurrentPageIndex(); } catch(e){}

      // انتظر استقرار القياسات (مهم جدًا على الهاتف عند الدوران)
      showLoading(true);
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

      await preloadImages(pages);

      // إزالة أي بقايا قديمة
      if (pageFlip) {
        try { pageFlip.destroy(); } catch(e){}
        pageFlip = null;
      }
      bookEl.innerHTML = "";

      // قياس مستقر
      const { pageW, pageH } = getStableBookSize();
      const mobile = isMobile();

      pageFlip = new St.PageFlip(bookEl, {
        width: pageW,
        height: pageH,

        size: "stretch",
        minWidth: mobile ? 280 : 315,
        maxWidth: 2000,
        minHeight: mobile ? 320 : 315,
        maxHeight: 2000,

        showCover: true,

        mobileScrollSupport: true,
        useMouseEvents: true,

        // تقليب أسهل على الهاتف
        swipeDistance: mobile ? 8 : 30,
        flippingTime: mobile ? 520 : 700,

        maxShadowOpacity: 0.35,
        disableFlipByClick: false
      });

      pageFlip.loadFromImages(pages);

      // ارجعي لنفس الصفحة بعد إعادة التهيئة
      try { pageFlip.flip(currentIndex); } catch(e){}

      showLoading(false);
    }

    // تشغيل أولي
    initFlipbookSafe();

    // أزرار
    document.getElementById('next').addEventListener('click', () => pageFlip && pageFlip.flipNext());
    document.getElementById('prev').addEventListener('click', () => pageFlip && pageFlip.flipPrev());

    // إعادة تهيئة آمنة عند التدوير/تغيير الحجم (Debounce)
    let timer = null;
    function scheduleReinit(){
      clearTimeout(timer);
      timer = setTimeout(() => initFlipbookSafe(), 350);
    }
    window.addEventListener('resize', scheduleReinit);
    window.addEventListener('orientationchange', () => setTimeout(scheduleReinit, 250));
  </script>
</body>
</html>
